<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>王者农场浇水计算器 选项卡终版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",sans-serif;}
body{background:#f5f7fa;padding:20px;}
.box{max-width:500px;margin:0 auto;background:#fff;border-radius:12px;padding:25px;box-shadow:0 2px 10px #ddd;}
h2{text-align:center;color:#2e7d32;margin-bottom:20px;}

/* 选项卡样式 */
.tab-box{display:flex;gap:8px;margin-bottom:20px;}
.tab{flex:1;height:44px;line-height:44px;text-align:center;border-radius:6px;
     background:#e0e0e0;cursor:pointer;font-weight:500;}
.tab.active{background:#4caf50;color:#fff;}

.item{margin-bottom:20px;}
label{display:block;margin-bottom:8px;color:#333;font-weight:500;}
input{width:100%;height:46px;padding:0 12px;border:1px solid #ccc;border-radius:6px;font-size:16px;}
button{width:100%;height:48px;background:#4caf50;color:#fff;border:none;border-radius:6px;font-size:17px;cursor:pointer;}
button:active{background:#388e3c;}

.result{margin-top:20px;padding:15px;background:#f1f8e9;border-radius:8px;display:none;}
.info{color:#d32f2f;font-weight:bold;margin:10px 0;font-size:15px;line-height:1.5;}
.final-plan{margin-top:12px; padding-top:12px; border-top:1px dashed #ccc;}
.plan-title{font-weight:bold;color:#1b5e20;margin-bottom:10px;font-size:15px;}
.water-item{padding:6px 0;font-size:15px;color:#222;}
.tip{margin-top:10px;font-size:14px;color:#666;}
</style>
</head>
<body>
<div class="box">
    <h2>王者农场浇水计算器</h2>

    <!-- 选项卡 -->
    <div class="tab-box">
        <div class="tab active" data-index="0">1小时作物</div>
        <div class="tab" data-index="1">8小时作物</div>
        <div class="tab" data-index="2">16小时作物</div>
        <div class="tab" data-index="3">32小时作物</div>
    </div>

    <div class="item">
        <label>游戏显示原生成熟时间（不浇水）</label>
        <input type="datetime-local" id="rawTime">
    </div>

    <button id="calcBtn">立即计算</button>

    <div class="result" id="resBox">
        <div class="info" id="baseInfo"></div>

        <!-- 最终保证方案 -->
        <div class="final-plan">
            <div class="plan-title">✅ 保证最快成熟浇水方案</div>
            <div id="finalWater"></div>
        </div>

        <div class="tip">说明：确保≥2次有效浇水，最后第二次预留足够间隔，绝对能正常完成浇水成熟</div>
        <div class="tip" style="margin-top:5px;">💡 温馨提示：在刚浇完水的情况下计算，时间会更精确</div>
    </div>
</div>

<script>
// 作物参数：总周期 / 最大间隔(1/3) / 最小间隔(1/30)
const cropRule = [
    {total:60,   maxGap:20,  minGap:2},
    {total:480,  maxGap:160, minGap:16},
    {total:960,  maxGap:320, minGap:32},
    {total:1920, maxGap:640, minGap:64}
];

// 当前选中作物
let currCrop = 0;

// 选项卡切换
document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currCrop = parseInt(tab.dataset.index);
    });
});

// 时间格式化
function fmtTime(d){
    let y=d.getFullYear();
    let m=String(d.getMonth()+1).padStart(2,'0');
    let day=String(d.getDate()).padStart(2,'0');
    let h=String(d.getHours()).padStart(2,'0');
    let mi=String(d.getMinutes()).padStart(2,'0');
    return `${y}-${m}-${day} ${h}:${mi}`;
}

// 计算主函数
function calc(){
    let rawVal = document.getElementById('rawTime').value;
    if(!rawVal){alert("请选择游戏原生成熟时间");return;}

    let rule = cropRule[currCrop];
    let now = new Date();
    let rawEnd = new Date(rawVal);

    // 时间合法性校验
    let maxAllow = new Date(now);
    maxAllow.setMinutes(now.getMinutes() + rule.total);
    if(rawEnd > maxAllow){
        alert("输入的成熟时间不能大于【当前时间+作物总周期】，请重新输入！");
        return;
    }

    // 核心公式：剩余时间 × 4/5 = 最快成熟剩余时间
    let remainMinutes = (rawEnd - now) / (60 * 1000);
    let realRemain = remainMinutes * 4 / 5;
    let realEnd = new Date(now);
    realEnd.setMinutes(realEnd.getMinutes() + realRemain);

    // 正确逻辑
    let maxGap = rule.maxGap;
    let minGap = rule.minGap;

    let last2Start = new Date(realEnd);
    last2Start.setMinutes(realEnd.getMinutes() - maxGap);

    let last2End = new Date(realEnd);
    last2End.setMinutes(realEnd.getMinutes() - minGap);

    let last1 = realEnd;

    // 展示文字
    let cropNames = ["1小时","8小时","16小时","32小时"];
    let info = `当前选择：${cropNames[currCrop]}作物\n`;
    info += `最大间隔：${maxGap}分钟｜最小间隔：${minGap}分钟\n`;
    info += `当前成熟：${fmtTime(rawEnd)}\n`;
    info += `最快成熟：${fmtTime(realEnd)}`;
    document.getElementById('baseInfo').innerText = info;

    let html = "";
    html += `<div class="water-item">⏰ 最后第二次浇水时间范围：${fmtTime(last2Start)} ~ ${fmtTime(last2End)}</div>`;
    html += `<div class="water-item">✅ 最后一次浇水时间点：${fmtTime(last1)}（浇完立即成熟）</div>`;
    document.getElementById('finalWater').innerHTML = html;

    document.getElementById('resBox').style.display = 'block';
}

// Safari 兼容：用 JS 绑定按钮事件（删除内联 onclick）
document.getElementById('calcBtn').addEventListener('click', calc);
</script>
</body>
</html>
