<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>王者农场浇水计算器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",sans-serif;}
body{background:#f5f7fa;padding:15px;}
.box{max-width:500px;margin:0 auto;background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 10px #ddd;}
h2{text-align:center;color:#2e7d32;margin-bottom:18px;font-size:20px;}

.tab-box{display:flex;gap:6px;margin-bottom:8px;}
.tab{flex:1;height:42px;line-height:42px;text-align:center;border-radius:6px;
     background:#e0e0e0;font-size:14px;font-weight:500;cursor:pointer;}
.tab.active{background:#4caf50;color:#fff;}

.base-info{
    background:#e8f5e9;
    padding:8px 10px;
    border-radius:6px;
    font-size:13px;
    color:#2e7d32;
    text-align:center;
    margin-bottom:16px;
    line-height:1.4;
}

.input-tab{
    display:flex;
    gap:6px;
    margin-bottom:16px;
}
.input-tab .itab{
    flex:1;
    height:38px;
    line-height:38px;
    text-align:center;
    border-radius:6px;
    background:#e0f2f1;
    font-size:14px;
    cursor:pointer;
}
.input-tab .itab.active{
    background:#009688;
    color:#fff;
}

.item{margin-bottom:16px;}
label{display:block;margin-bottom:6px;color:#333;font-size:14px;font-weight:500;}
input{width:100%;height:44px;padding:0 10px;border:1px solid #ccc;border-radius:6px;font-size:15px;}
.time-box{display:flex;gap:8px;}
.time-box input{width:50%;}
button{width:100%;height:46px;background:#4caf50;color:#fff;border:none;border-radius:6px;font-size:16px;}

.result{margin-top:18px;padding:14px;background:#f1f8e9;border-radius:8px;display:none;}
.info{color:#d32f2f;font-weight:bold;margin:8px 0;font-size:14px;line-height:1.6;white-space:pre-line;}
.plan{margin-top:12px;padding-top:12px;border-top:1px dashed #ccc;}
.plan-title{font-weight:bold;color:#1b5e20;margin-bottom:8px;font-size:14px;}
.water-item{padding:5px 0;font-size:14px;line-height:1.5;}
</style>
</head>
<body>
<div class="box">
    <h2>王者农场浇水计算器</h2>

    <div class="tab-box">
        <div class="tab" data-i="0">1小时</div>
        <div class="tab" data-i="1">8小时</div>
        <div class="tab active" data-i="2">16小时</div>
        <div class="tab" data-i="3">32小时</div>
    </div>

    <div class="base-info" id="baseInfoText">
        最短成熟周期：20分钟｜最佳浇水间隔：2分钟 ～ 20分钟
    </div>

    <div class="input-tab">
        <div class="itab active" data-mode="datetime">成熟时间</div>
        <div class="itab" data-mode="remain">剩余时间</div>
    </div>

    <div id="inputDatetime" class="item">
        <label>原生成熟时间</label>
        <input type="datetime-local" id="rawTime">
    </div>

    <div id="inputRemain" class="item" style="display:none;">
        <label>剩余时间（时/分）</label>
        <div class="time-box">
            <input type="number" id="remainH" placeholder="小时" min="0" value="0">
            <input type="number" id="remainM" placeholder="分钟" min="0" value="0">
        </div>
    </div>

    <div class="item">
        <label>水分维持时间（时/分）</label>
        <div class="time-box">
            <input type="number" id="h" placeholder="小时" min="0" value="0">
            <input type="number" id="m" placeholder="分钟" min="0" value="0">
        </div>
    </div>

    <button id="calc">计算</button>

    <div class="result" id="res">
        <div class="info" id="info"></div>
        <div class="plan">
            <div class="plan-title">✅ 最优浇水方案</div>
            <div id="water"></div>
        </div>
    </div>
</div>

<script>
const crop = [
    {t:60,  max:20, min:2},
    {t:480, max:160, min:16},
    {t:960, max:320, min:32},
    {t:1920,max:640, min:64}
];
let curr = 2; // 默认16小时作物
let inputMode = "datetime";

document.querySelectorAll('.tab').forEach(tab=>{
    tab.onclick = ()=>{
        document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
        tab.classList.add('active');
        curr = parseInt(tab.dataset.i);
        autoWater();
        updateBaseInfo();
    }
});

document.querySelectorAll('.itab').forEach(it=>{
    it.onclick = ()=>{
        document.querySelectorAll('.itab').forEach(i=>i.classList.remove('active'));
        it.classList.add('active');
        inputMode = it.dataset.mode;
        if(inputMode === "datetime"){
            document.getElementById('inputDatetime').style.display = "block";
            document.getElementById('inputRemain').style.display = "none";
        }else{
            document.getElementById('inputDatetime').style.display = "none";
            document.getElementById('inputRemain').style.display = "block";
        }
    }
});

function autoWater(){
    let total = crop[curr].t / 3;
    let hh = Math.floor(total / 60);
    let mm = Math.round(total % 60);
    document.getElementById('h').value = hh;
    document.getElementById('m').value = mm;
}

function toHourMin(totalMin){
    let h = Math.floor(totalMin / 60);
    let m = Math.round(totalMin % 60);
    if(h === 0) return `${m}分钟`;
    return `${h}小时${m}分钟`;
}

function updateBaseInfo(){
    let r = crop[curr];
    let step1 = r.t - r.t/12;
    let realMin = step1 * 4/5;
    
    let minText = toHourMin(r.min);
    let maxText = toHourMin(r.max);
    let realText = toHourMin(realMin);
    
    let txt = `最短成熟周期：${realText}｜最佳浇水间隔：${minText} ～ ${maxText}`;
    document.getElementById('baseInfoText').innerText = txt;
}

function fmt(d){
    let m = String(d.getMonth()+1).padStart(2,'0');
    let day = String(d.getDate()).padStart(2,'0');
    let h = String(d.getHours()).padStart(2,'0');
    let mi = String(d.getMinutes()).padStart(2,'0');
    return `${m}月${day}日 ${h}:${mi}`;
}

autoWater();
updateBaseInfo();

document.getElementById('calc').onclick = function(){
    let now = new Date();
    let rule = crop[curr];
    let remain = 0;
    let rawEnd;

    if(inputMode === "datetime"){
        let raw = document.getElementById('rawTime').value;
        if(!raw){ alert("请选择成熟时间"); return; }
        rawEnd = new Date(raw);
        remain = (rawEnd - now) / 60000;
    }else{
        let rh = parseInt(document.getElementById('remainH').value)||0;
        let rm = parseInt(document.getElementById('remainM').value)||0;
        remain = rh * 60 + rm;
        rawEnd = new Date(now);
        rawEnd.setMinutes(now.getMinutes() + remain);
        if(remain <= 0){ alert("请输入有效剩余时间"); return; }
    }

    let h = parseInt(document.getElementById('h').value) || 0;
    let m = parseInt(document.getElementById('m').value) || 0;
    let userWater = h * 60 + m;
    let fullWater = rule.t / 3;
    let past = fullWater - userWater;
    let short = past / 4;

    let realRemain = (remain - short) * 4/5;
    let realEnd = new Date(now);
    realEnd.setMinutes(now.getMinutes() + realRemain);

    // 最晚种植时间 = 最快成熟时间 - 最短成熟周期
    let step1 = rule.t - rule.t/12;
    let minTotalMins = step1 * 4/5;
    let latestPlantTime = new Date(realEnd);
    latestPlantTime.setMinutes(realEnd.getMinutes() - minTotalMins);

    let last2Start = new Date(realEnd);
    last2Start.setMinutes(realEnd.getMinutes() - rule.max);
    let last2End = new Date(realEnd);
    last2End.setMinutes(realEnd.getMinutes() - rule.min);

    // 结果输出（种植时间放最后）
    let txt = `当前计算时间：${fmt(now)}\n`;
    txt += `作物：${[1,8,16,32][curr]}小时\n`;
    txt += `已缩短：${short.toFixed(1)}分钟\n`;
    txt += `最快成熟：${fmt(realEnd)}\n`;
    txt += `如果中途没有出现干涸，那么最可能的种植时间是：${fmt(latestPlantTime)}`;
    document.getElementById('info').innerText = txt;

    let html = `⏰ 末次前浇水：${fmt(last2Start)} - ${fmt(last2End)}<br>`;
    html += `✅ 末次浇水：${fmt(realEnd)}（浇完即熟）`;
    document.getElementById('water').innerHTML = html;
    document.getElementById('res').style.display = 'block';
}
</script>
</body>
</html>
